<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>교통 현황</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    #map { width: 100%; height: 100%; }
  </style>
</head>
<body>
<div id="map"></div>

<!-- KAKAO_JS_KEY 를 카카오 개발자 콘솔의 JavaScript 키로 교체하세요 -->
<script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=5adb92664550cf353e8c360d940c0103&autoload=false"></script>
<script>
kakao.maps.load(function () {
  var params = new URLSearchParams(window.location.search);
  var lat   = parseFloat(params.get('lat')   || '37.5665');
  var lng   = parseFloat(params.get('lng')   || '126.9780');
  var level = parseInt(params.get('level')   || '6', 10);
  var name  = params.get('name') || '';

  var container = document.getElementById('map');
  var map = new kakao.maps.Map(container, {
    center: new kakao.maps.LatLng(lat, lng),
    level: level
  });

  // 실시간 교통 레이어
  map.addOverlayMapTypeId(kakao.maps.MapTypeId.TRAFFIC);

  // 목적지 마커
  var marker = new kakao.maps.Marker({
    position: new kakao.maps.LatLng(lat, lng),
    map: map
  });

  // 장소명 인포윈도우
  if (name) {
    var infowindow = new kakao.maps.InfoWindow({
      content: '<div style="padding:6px 10px;font-size:13px;font-weight:700;white-space:nowrap;">' + name + '</div>'
    });
    infowindow.open(map, marker);
  }
});
</script>
</body>
</html>
